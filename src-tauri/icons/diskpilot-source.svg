<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A3F4B"/>
      <stop offset="100%" stop-color="#2D323C"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2DD4A8"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="platter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A5060"/>
      <stop offset="100%" stop-color="#3E4452"/>
    </linearGradient>
  </defs>

  <!-- Rounded square body -->
  <rect width="512" height="512" rx="96" fill="url(#body)"/>

  <!-- Teal header bar -->
  <clipPath id="headerClip">
    <rect width="512" height="512" rx="96"/>
  </clipPath>
  <rect x="0" y="0" width="512" height="130" fill="url(#header)" clip-path="url(#headerClip)"/>

  <!-- Platter circle -->
  <circle cx="256" cy="296" r="120" fill="url(#platter)" stroke="#555C6A" stroke-width="4"/>

  <!-- Platter ring -->
  <circle cx="256" cy="296" r="80" fill="none" stroke="#555C6A" stroke-width="2" opacity="0.5"/>

  <!-- Center hub -->
  <circle cx="256" cy="296" r="18" fill="#14B8A6"/>

  <!-- LED indicator -->
  <circle cx="400" cy="430" r="16" fill="#22C55E"/>
  <circle cx="400" cy="430" r="8" fill="#4ADE80" opacity="0.8"/>
</svg>